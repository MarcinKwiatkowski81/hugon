name=MiniJson
version=1.0.0
author=hugon project
maintainer=hugon project
sentence=Streaming (SAX-style) JSON parser for Arduino Uno and other severely resource-constrained systems.
paragraph=Zero heap allocations, no std::, no exceptions, no RTTI.  Feed one character at a time; every JSON token fires a single lightweight callback.  Fits in ~54 bytes of SRAM (configurable via template parameters).  Supports objects, arrays, strings (with escapes), integers, floats, booleans, and null.  Optional MINIJSON_NO_FLOAT compile switch saves ~1.5 KB of Flash on AVR by avoiding the soft-float library.
